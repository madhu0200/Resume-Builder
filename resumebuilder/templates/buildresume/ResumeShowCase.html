{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume Templates Showcase</title>
  <link rel="stylesheet" href="{% static 'buildresume/ResumeShowCase.css' %}">
</head>
<body>
  <div class="gallery">
    {%for link in image_links %}
    <div class="template-card">
      <img src="{% static 'images/' %}{{link}}" alt="Template 1">
      <div class="overlay">
        <a href="ResumeTemplateImage{{forloop.counter}}" class="preview-btn">Preview</a>
      </div>
    </div>
    {% endfor %}

   
  </div>
</body>
</html>
